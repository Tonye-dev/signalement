<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
<style>
    :root { --accent:#4f8ef7; --accent2:#38d9a9; --accent3:#f7934f; --accent4:#f76f8e; --bg:#f0f4fb; --card-bg:#fff; --text-main:#1a2236; --text-muted:#7b8fb5; --border:#e4eaf5; }
    .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
    .page-header-left h2 { font-family:'Syne',sans-serif; font-size:1.3rem; font-weight:800; color:var(--text-main); margin:0; }
    .page-header-left p { font-size:.82rem; color:var(--text-muted); margin:4px 0 0; }

    .content-grid { display:grid; grid-template-columns:1fr 360px; gap:20px; align-items:start; }

    /* Table card */
    .table-card { background:var(--card-bg); border-radius:18px; border:1px solid var(--border); overflow:hidden; animation:slideUp .45s ease both; }
    .table-card-header { padding:18px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .table-card-title { font-family:'Syne',sans-serif; font-size:.9rem; font-weight:700; color:var(--text-main); }
    .search-wrap { position:relative; }
    .search-wrap input { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:7px 12px 7px 34px; font-size:.82rem; color:var(--text-main); outline:none; transition:border .18s; width:200px; }
    .search-wrap input:focus { border-color:var(--accent); }
    .search-wrap i { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:.85rem; }
    table { width:100%; border-collapse:collapse; }
    thead th { padding:12px 20px; font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--text-muted); background:#f8faff; border-bottom:1px solid var(--border); text-align:left; }
    tbody tr { border-bottom:1px solid #f5f7fc; transition:background .15s; }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:#f8faff; }
    tbody td { padding:14px 20px; font-size:.84rem; color:var(--text-main); vertical-align:middle; }
    .type-nom { font-weight:600; }
    .type-desc { font-size:.76rem; color:var(--text-muted); margin-top:2px; }
    .count-badge { background:rgba(79,142,247,.1); color:var(--accent); border-radius:50px; padding:2px 10px; font-size:.75rem; font-weight:600; }

    /* Form card */
    .form-card { background:var(--card-bg); border-radius:18px; border:1px solid var(--border); padding:24px; animation:slideUp .45s ease .1s both; position:sticky; top:80px; }
    .form-card-title { font-family:'Syne',sans-serif; font-size:.9rem; font-weight:700; color:var(--text-main); margin-bottom:18px; display:flex; align-items:center; gap:8px; }
    .form-card-title i { color:var(--accent); }
    .form-group { margin-bottom:16px; }
    .form-label { display:block; font-size:.79rem; font-weight:600; color:var(--text-main); margin-bottom:6px; }
    .form-label span { color:var(--accent4); }
    .form-input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:10px 13px; font-size:.84rem; color:var(--text-main); outline:none; transition:border .18s,box-shadow .18s; font-family:'DM Sans',sans-serif; }
    .form-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(79,142,247,.08); }
    .form-input::placeholder { color:var(--text-muted); }
    textarea.form-input { resize:vertical; min-height:80px; }
    .btn-submit { width:100%; background:var(--accent); color:#fff; border:none; border-radius:10px; padding:11px; font-size:.86rem; font-weight:600; cursor:pointer; transition:background .18s; display:flex; align-items:center; justify-content:center; gap:7px; margin-top:4px; }
    .btn-submit:hover { background:#3a7de8; }

    .empty-state { padding:50px 24px; text-align:center; color:var(--text-muted); }
    .empty-state i { font-size:2.5rem; opacity:.25; display:block; margin-bottom:12px; }

    @keyframes slideUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
    @media(max-width:900px) { .content-grid { grid-template-columns:1fr; } .form-card { position:static; } }
</style>

<div class="page-header">
    <div class="page-header-left">
        <h2><i class="bi bi-tags me-2" style="color:var(--accent);"></i>Types de Problèmes</h2>
        <p>Gérez les catégories de signalements disponibles pour les citoyens</p>
    </div>
</div>

<div class="content-grid">

    <!-- TABLE -->
    <div class="table-card">
        <div class="table-card-header">
            <span class="table-card-title">
                <span th:text="${typesProblemes != null ? typesProblemes.size() : 0}">0</span> type(s) de problème(s)
            </span>
            <div class="search-wrap">
                <i class="bi bi-search"></i>
                <input type="text" id="searchInput" placeholder="Rechercher...">
            </div>
        </div>

        <div th:if="${typesProblemes == null or typesProblemes.isEmpty()}" class="empty-state">
            <i class="bi bi-tags"></i>
            <p>Aucun type de problème créé.<br>Utilisez le formulaire pour en ajouter.</p>
        </div>

        <div th:unless="${typesProblemes == null or typesProblemes.isEmpty()}">
            <table id="typesTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Type de problème</th>
                        <th>Signalements</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="type, stat : ${typesProblemes}">
                        <td style="color:var(--text-muted); font-size:.78rem;" th:text="${stat.index + 1}">1</td>
                        <td>
                            <div class="type-nom" th:text="${type.nomType}">Type</div>
                            <div class="type-desc" th:text="${type.descriptionType ?: 'Aucune description'}" >—</div>
                        </td>
                        <td>
                            <span class="count-badge"
                                  th:text="${type.problemetype != null ? type.problemetype.size() : 0} + ' signalement(s)'">
                                0 signalement(s)
                            </span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- FORMULAIRE AJOUT -->
    <div class="form-card">
        <div class="form-card-title">
            <i class="bi bi-plus-circle"></i> Créer un nouveau type
        </div>

        <form id="typeForm">
            <div class="form-group">
                <label class="form-label">Nom du type <span>*</span></label>
                <input type="text" id="nomType" class="form-input"
                       placeholder="Ex: Voirie, Éclairage..." required>
            </div>
            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea id="descriptionType" class="form-input"
                          placeholder="Description optionnelle..."></textarea>
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">
                <i class="bi bi-check2"></i> Créer le type
                <span id="spinner" class="d-none" style="width:13px;height:13px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin .7s linear infinite;"></span>
            </button>
        </form>
    </div>

</div>

<div id="toast" style="display:none;position:fixed;top:20px;right:20px;z-index:1000;background:#1a2236;color:#fff;padding:12px 20px;border-radius:12px;font-size:.84rem;box-shadow:0 8px 24px rgba(0,0,0,.2);">
    <span id="toastMsg"></span>
</div>

<script>
    document.getElementById('searchInput')?.addEventListener('input', function() {
        const val = this.value.toLowerCase();
        document.querySelectorAll('#typesTable tbody tr').forEach(row => {
            row.style.display = row.textContent.toLowerCase().includes(val) ? '' : 'none';
        });
    });

    function showToast(msg, ok = true) {
        const t = document.getElementById('toast');
        document.getElementById('toastMsg').textContent = msg;
        t.style.background = ok ? '#1a2236' : '#f76f8e';
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3500);
    }

    document.getElementById('typeForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const spinner = document.getElementById('spinner');
        btn.disabled = true;
        spinner.classList.remove('d-none');

        const nomType = document.getElementById('nomType').value.trim();
        if (!nomType) { showToast('Le nom du type est obligatoire.', false); btn.disabled = false; spinner.classList.add('d-none'); return; }

        try {
            const res = await fetch(`/api/superadmin/types-problemes?nomType=${encodeURIComponent(nomType)}`, {
                method: 'POST'
            });
            if (res.ok) {
                showToast('Type créé avec succès !');
                setTimeout(() => window.location.reload(), 1200);
            } else {
                const err = await res.text();
                showToast('Erreur : ' + err, false);
            }
        } catch(err) {
            showToast('Erreur réseau.', false);
        }

        btn.disabled = false;
        spinner.classList.add('d-none');
    });
</script>
</div>
</body>
</html>
