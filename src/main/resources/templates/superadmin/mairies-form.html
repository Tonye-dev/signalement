<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
<style>
    :root { --accent:#4f8ef7; --accent2:#38d9a9; --accent3:#f7934f; --accent4:#f76f8e; --bg:#f0f4fb; --card-bg:#fff; --text-main:#1a2236; --text-muted:#7b8fb5; --border:#e4eaf5; }

    .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
    .page-header-left h2 { font-family:'Syne',sans-serif; font-size:1.3rem; font-weight:800; color:var(--text-main); margin:0; }
    .page-header-left p { font-size:.82rem; color:var(--text-muted); margin:4px 0 0; }

    .btn-secondary-aspu { background:var(--bg); color:var(--text-main); border:1px solid var(--border); border-radius:10px; padding:9px 18px; font-size:.83rem; font-weight:500; text-decoration:none; display:inline-flex; align-items:center; gap:7px; transition:all .18s; }
    .btn-secondary-aspu:hover { border-color:var(--accent); color:var(--accent); }

    .form-card { background:var(--card-bg); border-radius:18px; border:1px solid var(--border); padding:32px; max-width:680px; animation:slideUp .45s ease both; }
    .form-card:hover { box-shadow:0 8px 28px rgba(0,0,0,.06); }

    .form-group { margin-bottom:20px; }
    .form-label { display:block; font-size:.8rem; font-weight:600; color:var(--text-main); margin-bottom:7px; }
    .form-label span { color:var(--accent4); margin-left:2px; }

    .form-input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:11px 14px; font-size:.85rem; color:var(--text-main); outline:none; transition:border .18s, box-shadow .18s; font-family:'DM Sans',sans-serif; }
    .form-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(79,142,247,.08); }
    .form-input::placeholder { color:var(--text-muted); }

    /* Tags quartiers */
    .tags-wrap { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:10px; min-height:36px; padding:8px; background:var(--bg); border:1px solid var(--border); border-radius:10px; }
    .tag { display:inline-flex; align-items:center; gap:5px; background:rgba(79,142,247,.1); color:var(--accent); border:1px solid rgba(79,142,247,.2); border-radius:50px; padding:3px 10px; font-size:.75rem; font-weight:500; }
    .tag button { background:none; border:none; cursor:pointer; color:var(--accent); padding:0; font-size:.8rem; line-height:1; }
    .tag-input-row { display:flex; gap:8px; }
    .tag-input-row .form-input { flex:1; }
    .btn-add-tag { background:var(--accent); color:#fff; border:none; border-radius:9px; padding:10px 16px; font-size:.82rem; font-weight:600; cursor:pointer; transition:background .18s; white-space:nowrap; }
    .btn-add-tag:hover { background:#3a7de8; }

    .form-hint { font-size:.74rem; color:var(--text-muted); margin-top:5px; }

    .form-actions { display:flex; gap:10px; margin-top:28px; padding-top:20px; border-top:1px solid var(--border); flex-wrap:wrap; }
    .btn-submit { background:var(--accent); color:#fff; border:none; border-radius:10px; padding:12px 28px; font-size:.88rem; font-weight:600; cursor:pointer; transition:background .18s, transform .18s; display:inline-flex; align-items:center; gap:8px; }
    .btn-submit:hover { background:#3a7de8; transform:translateY(-2px); }

    @keyframes slideUp   { from{opacity:0;transform:translateY(18px)}  to{opacity:1;transform:translateY(0)} }
    @keyframes spin      { to { transform: rotate(360deg); } }
    @keyframes dropIn    { from{opacity:0;transform:translateY(-8px)}   to{opacity:1;transform:translateY(0)} }
</style>

<div class="page-header">
    <div class="page-header-left">
        <h2>
            <i class="bi bi-building-add me-2" style="color:var(--accent);"></i>
            <span th:text="${mairie != null ? 'Modifier la mairie' : 'Ajouter une mairie'}">Ajouter une mairie</span>
        </h2>
        <p th:text="${mairie != null ? 'Modifiez les informations de cette mairie' : 'Enregistrez une nouvelle mairie sur la plateforme'}">Description</p>
    </div>
    <a th:href="@{/superadmin/mairies}" class="btn-secondary-aspu">
        <i class="bi bi-arrow-left"></i> Retour
    </a>
</div>

<div class="form-card">
    <form id="mairieForm">

        <div class="form-group">
            <label class="form-label">Nom de la mairie <span>*</span></label>
            <input type="text" id="nom" class="form-input"
                   placeholder="Ex: Mairie du 1er arrondissement"
                   th:value="${mairie?.nom}"
                   required>
        </div>

        <div class="form-group">
            <label class="form-label">Adresse / Ville <span>*</span></label>
            <input type="text" id="adresse" class="form-input"
                   placeholder="Ex: Yaoundé, Centre"
                   th:value="${mairie?.adresse}"
                   required>
        </div>

        <div class="form-group">
            <label class="form-label">Zones d'intervention (quartiers)</label>
            <div class="tags-wrap" id="tagsWrap">
                <th:block th:if="${mairie?.zoneIntervention != null}">
                    <span th:each="zone : ${mairie.zoneIntervention}"
                          class="tag" th:data-value="${zone}">
                        <span th:text="${zone}">Zone</span>
                        <button type="button" onclick="removeTag(this)">×</button>
                    </span>
                </th:block>
            </div>
            <div class="tag-input-row">
                <input type="text" id="zoneInput" class="form-input"
                       placeholder="Ex: Bastos, Omnisport...">
                <button type="button" class="btn-add-tag" onclick="addTag()">
                    <i class="bi bi-plus"></i> Ajouter
                </button>
            </div>
            <p class="form-hint">Appuyez sur Entrée ou cliquez sur "Ajouter" pour chaque quartier.</p>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-submit" id="submitBtn">
                <i class="bi bi-check2"></i>
                <span th:text="${mairie != null ? 'Enregistrer les modifications' : 'Créer la mairie'}">Créer</span>
                <span id="spinner" class="d-none" style="width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin .7s linear infinite;"></span>
            </button>
            <a th:href="@{/superadmin/mairies}" class="btn-secondary-aspu">Annuler</a>
        </div>

    </form>
</div>

<!-- Toast -->
<div id="toast" style="display:none;position:fixed;top:20px;right:20px;z-index:1000;background:#1a2236;color:#fff;padding:12px 20px;border-radius:12px;font-size:.84rem;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:dropIn .2s ease;">
    <span id="toastMsg"></span>
</div>

<input type="hidden" id="mairieIdHidden" th:value="${mairie?.id}">

<script>
    const mairieId = document.getElementById('mairieIdHidden').value || null;

    function getTags() {
        return [...document.querySelectorAll('#tagsWrap .tag')].map(t => t.dataset.value);
    }

    function addTag() {
        const input = document.getElementById('zoneInput');
        const val = input.value.trim();
        if (!val) return;
        const tag = document.createElement('span');
        tag.className = 'tag';
        tag.dataset.value = val;
        tag.innerHTML = `<span>${val}</span><button type="button" onclick="removeTag(this)">×</button>`;
        document.getElementById('tagsWrap').appendChild(tag);
        input.value = '';
    }

    function removeTag(btn) {
        btn.closest('.tag').remove();
    }

    document.getElementById('zoneInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); addTag(); }
    });

    function showToast(msg, ok = true) {
        const t = document.getElementById('toast');
        document.getElementById('toastMsg').textContent = msg;
        t.style.background = ok ? '#1a2236' : '#f76f8e';
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3500);
    }

    document.getElementById('mairieForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const spinner = document.getElementById('spinner');
        btn.disabled = true;
        spinner.classList.remove('d-none');

        const token = document.cookie.split('; ').find(r => r.startsWith('XSRF-TOKEN='))?.split('=')[1];

        const body = {
            nom: document.getElementById('nom').value,
            adresse: document.getElementById('adresse').value,
            zoneIntervention: getTags()
        };

        const url = mairieId
            ? `/api/superadmin/mairies/${mairieId}`
            : '/api/superadmin/mairies';
        const method = mairieId ? 'PUT' : 'POST';

        try {
            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            if (res.ok) {
                showToast(mairieId ? 'Mairie modifiée avec succès !' : 'Mairie créée avec succès !');
                setTimeout(() => window.location.href = '/superadmin/mairies', 1500);
            } else {
                const err = await res.text();
                showToast('Erreur : ' + err, false);
            }
        } catch(err) {
            showToast('Erreur réseau. Veuillez réessayer.', false);
        }

        btn.disabled = false;
        spinner.classList.add('d-none');
    });
</script>
</div>
</body>
</html>
