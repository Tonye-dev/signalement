<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<div th:fragment="header">
    <style>
        .aspu-topbar {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255,255,255,.96);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #e4eaf5;
            padding: 0 32px; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .topbar-left h1 {
            font-family: 'Syne', sans-serif;
            font-size: 1.15rem; font-weight: 700; color: #1a2236; margin: 0;
        }
        .topbar-left p { font-size: .73rem; color: #7b8fb5; margin: 0; }

        .topbar-actions { display: flex; align-items: center; gap: 10px; }

        .topbar-date {
            background: #f0f4fb; border: 1px solid #e4eaf5;
            border-radius: 50px; padding: 5px 14px;
            font-size: .75rem; color: #7b8fb5;
            display: flex; align-items: center; gap: 6px;
        }

        /* ── USER PILL ── */
        .topbar-user {
            display: flex; align-items: center; gap: 10px;
            background: #f0f4fb; border: 1px solid #e4eaf5;
            border-radius: 50px; padding: 4px 16px 4px 4px;
            cursor: pointer; transition: all .18s;
            text-decoration: none; position: relative;
        }
        .topbar-user:hover {
            border-color: #4f8ef7; background: #fff;
            box-shadow: 0 4px 14px rgba(79,142,247,.12);
        }

        /* ── AVATAR ── */
        /* Photo réelle */
        .topbar-avatar-photo {
            width: 34px; height: 34px; border-radius: 50%;
            object-fit: cover;
            border: 2px solid #fff;
            box-shadow: 0 2px 6px rgba(0,0,0,.1);
            flex-shrink: 0;
            display: block;
        }

        /* Cercle gris neutre si pas de photo */
        .topbar-avatar-placeholder {
            width: 34px; height: 34px; border-radius: 50%;
            background: #dde3f0;
            border: 2px solid #fff;
            box-shadow: 0 2px 6px rgba(0,0,0,.08);
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            color: #7b8fb5; font-size: 1rem;
        }

        /* ── NOM ── */
        .topbar-username {
            font-size: .82rem; font-weight: 600;
            color: #1a2236; white-space: nowrap;
        }

        .topbar-chevron { font-size: .72rem; color: #b0bece; }

        /* ── DROPDOWN ── */
        .topbar-dropdown {
            position: absolute; top: calc(100% + 10px); right: 0;
            background: #fff; border: 1px solid #e4eaf5;
            border-radius: 14px;
            box-shadow: 0 12px 40px rgba(0,0,0,.12);
            min-width: 220px; padding: 8px;
            display: none; z-index: 300;
            animation: dropIn .18s ease;
        }
        @keyframes dropIn {
            from { opacity:0; transform:translateY(-8px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .topbar-user:hover .topbar-dropdown,
        .topbar-user:focus-within .topbar-dropdown { display: block; }

        /* En-tête dropdown */
        .dd-header {
            padding: 12px 14px 12px;
            border-bottom: 1px solid #f0f4fb;
            margin-bottom: 6px;
            display: flex; align-items: center; gap: 12px;
        }

        .dd-header-photo {
            width: 44px; height: 44px; border-radius: 50%;
            object-fit: cover; flex-shrink: 0;
            border: 2px solid #e4eaf5;
        }

        .dd-header-placeholder {
            width: 44px; height: 44px; border-radius: 50%;
            background: #dde3f0; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            color: #7b8fb5; font-size: 1.2rem;
            border: 2px solid #e4eaf5;
        }

        .dd-header-name { font-size: .85rem; font-weight: 700; color: #1a2236; }
        .dd-header-email {
            font-size: .72rem; color: #7b8fb5;
            white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis; max-width: 140px;
        }

        .dd-item {
            display: flex; align-items: center; gap: 9px;
            padding: 9px 12px; border-radius: 9px;
            font-size: .82rem; color: #1a2236;
            text-decoration: none; font-weight: 500;
            transition: background .15s;
        }
        .dd-item:hover { background: #f0f4fb; color: #1a2236; }
        .dd-item i { font-size: .95rem; color: #7b8fb5; width: 16px; flex-shrink: 0; }
        .dd-divider { border: none; border-top: 1px solid #f0f4fb; margin: 5px 0; }
        .dd-item.dd-logout { color: #f76f8e; }
        .dd-item.dd-logout i { color: #f76f8e; }
        .dd-item.dd-logout:hover { background: rgba(247,111,142,.06); }

        /* Mobile */
        .sb-toggle {
            display: none; background: none; border: none;
            font-size: 1.3rem; color: #1a2236; cursor: pointer; padding: 4px 8px;
        }
        @media (max-width: 768px) {
            .sb-toggle { display: block; }
            .topbar-date { display: none; }
            .aspu-topbar { padding: 0 16px; }
        }
    </style>

    <div class="aspu-topbar">

        <!-- ── GAUCHE : titre + date ── -->
        <div style="display:flex; align-items:center; gap:14px;">
            <button class="sb-toggle"
                    onclick="const s=document.getElementById('sidebar-wrapper');
                             s.style.transform=s.style.transform==='translateX(0px)'
                             ?'translateX(-260px)':'translateX(0px)'">
                <i class="bi bi-list"></i>
            </button>
            <div class="topbar-left">
                <h1 th:text="${pageTitle}">Tableau de bord</h1>
                <p id="topbarDate"></p>
            </div>
        </div>

        <!-- ── DROITE : date + user ── -->
        <div class="topbar-actions">

            <div class="topbar-date">
                <i class="bi bi-calendar3"></i>
                <span id="topbarDateBadge"></span>
            </div>

            <!-- USER PILL -->
            <div class="topbar-user" sec:authorize="isAuthenticated()" tabindex="0">

                <!-- Photo réelle si définie, sinon cercle gris avec icône personne -->
                <th:block th:if="${currentUser != null and currentUser.photoPath != null}">
                    <img class="topbar-avatar-photo"
                         th:src="@{${currentUser.photoPath}}"
                         alt="Photo de profil">
                </th:block>
                <th:block th:unless="${currentUser != null and currentUser.photoPath != null}">
                    <div class="topbar-avatar-placeholder">
                        <i class="bi bi-person"></i>
                    </div>
                </th:block>

                <!-- Nom de l'utilisateur -->
                <span class="topbar-username"
                      th:text="${currentUser != null ? currentUser.prenom + ' ' + currentUser.nom : 'Utilisateur'}">
                </span>

                <i class="bi bi-chevron-down topbar-chevron"></i>

                <!-- DROPDOWN -->
                <div class="topbar-dropdown">

                    <!-- En-tête photo + nom + email -->
                    <div class="dd-header">
                        <th:block th:if="${currentUser != null and currentUser.photoPath != null}">
                            <img class="dd-header-photo"
                                 th:src="@{${currentUser.photoPath}}"
                                 alt="Photo">
                        </th:block>
                        <th:block th:unless="${currentUser != null and currentUser.photoPath != null}">
                            <div class="dd-header-placeholder">
                                <i class="bi bi-person"></i>
                            </div>
                        </th:block>
                        <div>
                            <div class="dd-header-name"
                                 th:text="${currentUser != null ? currentUser.prenom + ' ' + currentUser.nom : 'Utilisateur'}">
                            </div>
                            <div class="dd-header-email"
                                 th:text="${currentUser != null ? currentUser.email : ''}">
                            </div>
                        </div>
                    </div>

                    <!-- Liens Citoyen -->
                    <a th:href="@{/citoyen/profil}" class="dd-item" sec:authorize="hasRole('CITOYEN')">
                        <i class="bi bi-person-circle"></i> Mon profil
                    </a>
                    <a th:href="@{/citoyen/profil/modifier}" class="dd-item" sec:authorize="hasRole('CITOYEN')">
                        <i class="bi bi-pencil-square"></i> Modifier mes infos
                    </a>
                    <a th:href="@{/citoyen/profil/photo}" class="dd-item" sec:authorize="hasRole('CITOYEN')">
                        <i class="bi bi-camera"></i> Changer ma photo
                    </a>

                    <!-- Liens Administrateur -->
                    <a th:href="@{/administrateur/profil}" class="dd-item" sec:authorize="hasRole('ADMINISTRATEUR')">
                        <i class="bi bi-person-circle"></i> Mon profil
                    </a>
                    <a th:href="@{/administrateur/profil/modifier}" class="dd-item" sec:authorize="hasRole('ADMINISTRATEUR')">
                        <i class="bi bi-pencil-square"></i> Modifier mes infos
                    </a>

                    <!-- Liens SuperAdmin -->
                    <a th:href="@{/superadmin/profil}" class="dd-item" sec:authorize="hasRole('SUPERADMIN')">
                        <i class="bi bi-person-circle"></i> Mon profil
                    </a>

                    <hr class="dd-divider">

                    <a th:href="@{/logout}" class="dd-item dd-logout">
                        <i class="bi bi-box-arrow-right"></i> Déconnexion
                    </a>
                </div>

            </div>
        </div>
    </div>

    <script>
        const now = new Date();
        const opts = { weekday:'long', day:'numeric', month:'long', year:'numeric' };
        const dateStr = now.toLocaleDateString('fr-FR', opts);
        document.getElementById('topbarDateBadge').textContent = dateStr;
        document.getElementById('topbarDate').textContent = dateStr;
    </script>
</div>

</body>
</html>
