<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
<style>
    :root { --accent:#4f8ef7; --accent2:#38d9a9; --bg:#f0f4fb; --card-bg:#fff; --text-main:#1a2236; --text-muted:#7b8fb5; --border:#e4eaf5; }
    .back-link { display:inline-flex; align-items:center; gap:6px; font-size:.82rem; color:var(--text-muted); text-decoration:none; margin-bottom:20px; transition:color .15s; }
    .back-link:hover { color:var(--accent); }
    .page-header { margin-bottom:20px; }
    .page-header h2 { font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:800; color:var(--text-main); margin:0; }
    .page-header p { font-size:.82rem; color:var(--text-muted); margin:4px 0 0; }

    /* Filtre service */
    .filters-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
    .filter-tab { background:var(--card-bg); border:1px solid var(--border); border-radius:50px; padding:5px 14px; font-size:.76rem; font-weight:600; color:var(--text-muted); cursor:pointer; transition:all .15s; user-select:none; }
    .filter-tab.active { background:rgba(79,142,247,.1); border-color:rgba(79,142,247,.3); color:var(--accent); }

    .agents-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px; }
    .agent-card { background:var(--card-bg); border-radius:18px; border:1px solid var(--border); padding:22px; text-align:center; animation:slideUp .4s ease both; transition:transform .2s,box-shadow .2s; }
    .agent-card:hover { transform:translateY(-4px); box-shadow:0 10px 28px rgba(0,0,0,.08); }

    .agent-photo { width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid var(--border); margin:0 auto 14px; display:block; }
    .agent-photo-placeholder { width:80px; height:80px; border-radius:50%; background:linear-gradient(135deg,var(--accent),#7b8fb5); display:flex; align-items:center; justify-content:center; font-size:1.6rem; color:#fff; margin:0 auto 14px; }

    .agent-nom { font-family:'Syne',sans-serif; font-weight:700; font-size:.88rem; color:var(--text-main); margin-bottom:4px; }
    .agent-poste { font-size:.76rem; color:var(--accent); font-weight:600; margin-bottom:10px; }
    .agent-service { font-size:.73rem; color:var(--text-muted); background:var(--bg); border-radius:50px; padding:2px 9px; display:inline-block; margin-bottom:10px; }

    .agent-infos { border-top:1px solid var(--border); padding-top:10px; }
    .agent-info-line { display:flex; align-items:center; justify-content:space-between; font-size:.74rem; padding:3px 0; }
    .agent-info-line .label { color:var(--text-muted); }
    .agent-info-line .val { color:var(--text-main); font-weight:500; }

    .empty-state { padding:60px; text-align:center; color:var(--text-muted); background:var(--card-bg); border-radius:18px; border:1px solid var(--border); }
    .empty-state i { font-size:2.5rem; opacity:.2; display:block; margin-bottom:12px; }

    @keyframes slideUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
    @media(max-width:600px) { .agents-grid { grid-template-columns:1fr 1fr; } }
</style>

<a th:href="@{/mairies/{id}(id=${mairie.id})}" class="back-link">
    <i class="bi bi-arrow-left"></i> Retour à la vitrine
</a>

<div class="page-header">
    <h2><i class="bi bi-people me-2" style="color:var(--accent2);"></i>
        Personnel — <span th:text="${mairie.nom}">Mairie</span>
    </h2>
    <p>Les agents et responsables de la mairie</p>
</div>

<!-- Filtres par service -->
<div class="filters-bar" th:if="${services != null and !services.isEmpty()}">
    <span class="filter-tab active" onclick="filtrer('TOUS', this)">Tous</span>
    <span th:each="s : ${services}"
          class="filter-tab"
          th:data-service="${s.id}"
          th:text="${s.nom}"
          onclick="filtrer(this.dataset.service, this)">Service</span>
    <span class="filter-tab" onclick="filtrer('SANS', this)">Sans service</span>
</div>

<div th:if="${agents == null or agents.isEmpty()}" class="empty-state">
    <i class="bi bi-people"></i>
    <p>Aucun agent renseigné pour le moment.</p>
</div>

<div class="agents-grid" th:unless="${agents == null or agents.isEmpty()}">
    <div th:each="a, stat : ${agents}"
         class="agent-card"
         th:data-service="${a.service != null ? a.service.id : 'SANS'}"
         th:style="'animation-delay:' + ${stat.index * 0.06} + 's'">

        <img th:if="${a.photoPath != null}" th:src="@{${a.photoPath}}"
             alt="" class="agent-photo">
        <div th:unless="${a.photoPath != null}" class="agent-photo-placeholder">
            <i class="bi bi-person"></i>
        </div>

        <div class="agent-nom" th:text="${a.prenom + ' ' + a.nom}">Prénom Nom</div>
        <div class="agent-poste" th:text="${a.poste}">Poste</div>
        <div class="agent-service" th:if="${a.service != null}" th:text="${a.service.nom}">Service</div>

        <div class="agent-infos">
            <div class="agent-info-line" th:if="${a.dateNaissance != null}">
                <span class="label">Né(e) le</span>
                <span class="val" th:text="${#temporals.format(a.dateNaissance, 'dd/MM/yyyy')}">Date</span>
            </div>
            <div class="agent-info-line" th:if="${a.datePriseDeFonction != null}">
                <span class="label">En poste depuis</span>
                <span class="val" th:text="${#temporals.format(a.datePriseDeFonction, 'dd/MM/yyyy')}">Date</span>
            </div>
        </div>
    </div>
</div>

<script>
    function filtrer(val, el) {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('.agent-card').forEach(c => {
            if (val === 'TOUS') { c.style.display = ''; return; }
            c.style.display = c.dataset.service == val ? '' : 'none';
        });
    }
</script>
</div>
</body>
</html>
